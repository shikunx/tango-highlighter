<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 16px;
        margin: 0;
        width: 300px;
        font-size: 16px;
      }

      h2 {
        padding: 0;
        margin: 0;
      }

      input {
        flex: 1;
        font-size: 16px;
      }

      .input-container {
        display: flex;
        gap: 8px;
      }

      #wordList {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Known words</h2>
    <div class="input-container">
      <input type="text" id="wordInput" placeholder="Enter a known word" />
      <button id="addBtn">Add</button>
    </div>

    <div>Total: <strong id="wordCount">0</strong> (Click a word to delete)</div>

    <div>
      <h2>Actions</h2>
      <div class="input-container">
        <label for="clickAction">Click</label>
        <select id="clickAction">
          <option value="search-reading">Search reading</option>
          <option value="mark-known">Mark as known</option>
        </select>
      </div>
      <div class="input-container">
        <label for="doubleClickAction">Double-click</label>
        <select id="doubleClickAction">
          <option value="search-reading">Search reading</option>
          <option value="mark-known">Mark as known</option>
        </select>
      </div>
    </div>

    <div id="wordList"></div>

    <button id="clearAllBtn">Clear all</button>

    <script src="popup.js"></script>
  </body>
</html>
